---
- name: Install requied packages on RHEL
  ansible.builtin.yum:
    name:
      - "{{ java_version_rhel | default('java-1.8.0-openjdk') }}"
      - unzip
      - tar
      - wget
    state: present

- name: Create Jboss User
  ansible.builtin.user:
    name: "{{ jboss_user }}"
    state: present
    create_home: yes
    shell: /bin/bash

- name: Create Installation Directory
  ansible.builtin.file:
     path: "{{ jboss_install_dir }}"
     state: directory
     owner: "{{ jboss_user }}"
     group: "{{ jboss_group }} |default(jboss_group) }}"
     mode: '0755'
